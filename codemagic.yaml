# Codemagic build pipeline — iOS + Android from the Capacitor project
workflows:
  ios-release:
    name: Anime Studio Tycoon — iOS
    instance_type: mac_mini_m2
    environment:
      groups: [app_store_connect]
      vars:
        BUNDLE_ID: "com.trainyouragent.animestudiotycoon"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: AppStoreConnectKey
    scripts:
      - name: Install deps
        script: npm ci || npm install
      - name: Smoke test
        script: npm test
      - name: Assemble web (www) from repo source
        script: npm run prepare-native
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync
        script: npx cap sync ios
      - name: Set up signing
        script: |
          keychain initialize
          app-store-connect certificates create --type IOS_DISTRIBUTION --save || true
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts: [build/ios/ipa/*.ipa]
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Anime Studio Tycoon — Android
    instance_type: linux_x2
    environment:
      groups: [google_play, keystore_credentials]
      vars:
        PACKAGE_NAME: "com.trainyouragent.animestudiotycoon"
      node: 20
    scripts:
      - name: Install deps
        script: npm ci || npm install
      - name: Smoke test
        script: npm test
      - name: Assemble web (www) from repo source
        script: npm run prepare-native
      - name: Add Android platform
        script: npx cap add android || true
      - name: Sync
        script: npx cap sync android
      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts: [android/app/build/outputs/**/*.aab]
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
