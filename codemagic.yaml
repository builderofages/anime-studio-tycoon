# Codemagic build pipeline — iOS + Android from the Capacitor project
workflows:
  ios-release:
    name: Anime Studio Tycoon — iOS
    instance_type: mac_mini_m2
    environment:
      groups: [app_store_connect]
      vars:
        BUNDLE_ID: "com.trainyouragent.animestudiotycoon"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 20
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: AppStoreConnectKey
    scripts:
      - name: Install deps
        script: npm ci || npm install
      - name: Assemble web (www)
        script: |
          mkdir -p www
          curl -fsSL "https://d2ol7oe51mr4n9.cloudfront.net/user_342M7OMJEmtQi5ZXBKPVqJZUjCn/049d3e57-4991-46cf-a63d-35b3bc7a915a.zip" -o /tmp/game.zip
          unzip -o /tmp/game.zip -d www
          cp iap.js www/ 2>/dev/null || true
          grep -q 'iap.js' www/index.html || sed -i.bak 's#</body>#<script src="iap.js"></script></body>#' www/index.html
          rm -f www/index.html.bak
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Sync
        script: npx cap sync ios
      - name: Set up signing
        script: |
          keychain initialize
          openssl genrsa -out /tmp/cert_key.pem 2048
          app-store-connect certificates create --type IOS_DISTRIBUTION --certificate-key=@file:/tmp/cert_key.pem --save
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --certificate-key=@file:/tmp/cert_key.pem --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa --workspace "$XCODE_WORKSPACE" --scheme "$XCODE_SCHEME"
    artifacts: [build/ios/ipa/*.ipa]
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  android-release:
    name: Anime Studio Tycoon — Android
    instance_type: linux_x2
    environment:
      groups: [google_play, keystore_credentials]
      vars:
        PACKAGE_NAME: "com.trainyouragent.animestudiotycoon"
      node: 20
    scripts:
      - name: Install deps
        script: npm ci || npm install
      - name: Assemble web (www)
        script: |
          mkdir -p www
          curl -fsSL "https://d2ol7oe51mr4n9.cloudfront.net/user_342M7OMJEmtQi5ZXBKPVqJZUjCn/049d3e57-4991-46cf-a63d-35b3bc7a915a.zip" -o /tmp/game.zip
          unzip -o /tmp/game.zip -d www
          cp iap.js www/ 2>/dev/null || true
          grep -q 'iap.js' www/index.html || sed -i.bak 's#</body>#<script src="iap.js"></script></body>#' www/index.html
          rm -f www/index.html.bak
      - name: Add Android platform
        script: npx cap add android || true
      - name: Sync
        script: npx cap sync android
      - name: Build AAB
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts: [android/app/build/outputs/**/*.aab]
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
