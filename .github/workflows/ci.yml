name: CI — smoke test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm test
      - run: npm run test:sim
      - run: npm run test:web-qa
        env:
          PREFLIGHT_URL: https://anime-studio-tycoon.vercel.app
      - run: npm run launch-preflight
        env:
          PREFLIGHT_URL: https://anime-studio-tycoon.vercel.app